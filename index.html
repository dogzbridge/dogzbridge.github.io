<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DOGZ BRIDGE</title>
    <link rel="icon" href="https://i2c.seadn.io/ethereum/0x495f947276749ce646f68ac8c248420045cb7b5e/c5baafdbaf18d60cb14596e26b8675/19c5baafdbaf18d60cb14596e26b8675.png?w=350" type="image/png" />
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js">
    </script>
    <style>
        /* ===== 全局重置 ===== */
        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg-primary);
            transition: background 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            position: relative;
        }
        .light {
            --bg-primary: #f7f8fa;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --bg-hover: #e8ecf0;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --switch-bg: #d1d5db;
            --switch-dot: #ffffff;
            --token-bg: #f3f4f6;
            --error: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --card-border: #e5e7eb;
            --placeholder: #9ca3af;
            --input-bg: #f9fafb;
            --chain-bg: #f3f4f6;
            --divider: #e5e7eb;
            --theme-btn-bg: #f0f2f5;
            --theme-btn-active: #ffffff;
            --theme-btn-shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
        }
        .dark {
            --bg-primary: #0d0d1a;
            --bg-card: #1a1a2e;
            --bg-input: #252540;
            --bg-hover: #2d2d4a;
            --text-primary: #f1f1f6;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b85;
            --border-color: #2d2d4a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-light: #1e1b4b;
            --switch-bg: #3d3d5c;
            --switch-dot: #f1f1f6;
            --token-bg: #252540;
            --error: #f87171;
            --success: #34d399;
            --warning: #fbbf24;
            --card-border: #2d2d4a;
            --placeholder: #6b6b85;
            --input-bg: #1a1a2e;
            --chain-bg: #252540;
            --divider: #2d2d4a;
            --theme-btn-bg: #2d2d4a;
            --theme-btn-active: #1a1a2e;
            --theme-btn-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        /* ===== 顶部栏 ===== */
        .global-top-bar {
            width: 100%;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .global-top-bar .brand {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
            font-family: 'Impact', sans-serif;
            letter-spacing: 0.5px;
        }
        .global-top-bar .brand .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
            border: none;
            flex-shrink: 0;
        }
        .global-top-bar .brand .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .global-top-bar .actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ----- 主题切换 ----- */
        .theme-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--theme-btn-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            box-shadow: var(--theme-btn-shadow);
            flex-shrink: 0;
        }
        .theme-toggle-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            transform: scale(1.05);
        }
        .theme-toggle-btn:active {
            transform: scale(0.9);
        }
        .theme-toggle-btn svg,
        .theme-toggle-btn i {
            pointer-events: none;
        }
        .theme-toggle-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .theme-toggle-btn svg circle {
            fill: currentColor;
        }

        /* ----- 钱包按钮 ----- */
        .global-top-bar .wallet-btn {
            background: transparent;
            color: var(--text-primary);
            font-weight: 500;
            padding: 4px 10px 4px 6px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            min-height: 32px;
        }
        .global-top-bar .wallet-btn:hover {
            background: var(--bg-hover);
        }
        .global-top-bar .wallet-btn .wallet-icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            border-radius: 50%;
            overflow: hidden;
            background: transparent;
        }
        .global-top-bar .wallet-btn .wallet-icon-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
        }
        .wallet-btn .wallet-icon-wrap .dot-red {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }
        .wallet-btn .wallet-status-text {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .wallet-btn.connected {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* ===== 主内容 ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 20px;
        }
        #app {
            width: 100%;
            max-width: 480px;
            margin: 60px auto 0;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 24px;
            padding: 20px 16px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            transition: background 0.25s ease, border 0.25s ease;
        }
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--card-border);
        }
        .card-light {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 8px 12px;
            transition: background 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .amount-input {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            width: 70%;
            outline: none;
            padding: 4px 0;
        }
        .amount-input::placeholder {
            color: var(--placeholder);
            font-weight: 400;
        }
        .amount-input::-webkit-outer-spin-button,
        .amount-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .amount-input[type="number"] {
            -moz-appearance: textfield;
        }
        .amount-input-readonly {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            width: 70%;
            outline: none;
            padding: 4px 0;
            cursor: default;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 16px;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline:hover {
            background: var(--bg-hover);
        }

        .swap-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: -10px auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .swap-btn:hover {
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        /* ===== 链选择器 ===== */
        .chain-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px 6px 6px;
            border-radius: 14px;
            background: var(--chain-bg);
            border: 1px solid transparent;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }
        .chain-selector:hover {
            border-color: var(--border-color);
        }
        .chain-selector .chain-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            overflow: hidden;
            background: transparent;
            border: none;
        }
        .chain-selector .chain-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .chain-selector .chain-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .chain-selector .chain-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }
        .chain-selector .chain-dropdown-arrow {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* ===== 代币图标 ===== */
        .token-icon-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }
        .token-icon-wrapper .main-icon {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            background: transparent;
            border: none;
        }
        .token-icon-wrapper .main-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .token-icon-wrapper .chain-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
            background: transparent;
            border: none;
        }
        .token-icon-wrapper .chain-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .token-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .token-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .token-symbol {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ===== 其他 ===== */
        .address-input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            transition: border 0.2s ease;
        }
        .address-input:focus {
            border-color: var(--accent);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 8px;
            z-index: 50;
            max-height: 280px;
            overflow-y: auto;
            display: none;
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
            color: var(--text-primary);
        }
        .dropdown-item:hover {
            background: var(--bg-hover);
        }
        .dropdown-item .item-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            overflow: hidden;
            background: transparent;
            border: none;
        }
        .dropdown-item .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .dropdown-item .item-name {
            font-size: 14px;
            font-weight: 500;
        }
        .dropdown-item .item-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .chain-group {
            position: relative;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .toast.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        .toast.error {
            border-color: var(--error);
        }
        .toast.success {
            border-color: var(--success);
        }
        .toast a {
            color: var(--accent);
            text-decoration: underline;
            word-break: break-all;
            font-weight: 600;
        }
        .toast a:hover {
            color: var(--accent-hover);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hidden {
            display: none !important;
        }

        /* ===== 底部 ===== */
        .global-footer {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px 20px 30px 20px;
            font-size: 14px;
            color: var(--text-secondary);
            background: transparent;
            flex-shrink: 0;
            margin-top: auto;
        }
        .global-footer img {
            height: 20px;
            width: auto;
            display: block;
        }
        .global-footer span {
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .global-top-bar {
                padding: 8px 16px;
            }
            .global-top-bar .brand {
                font-size: 13px;
                gap: 3px;
            }
            .global-top-bar .brand .logo-icon {
                width: 36px;
                height: 36px;
            }
            .theme-toggle-btn {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .theme-toggle-btn svg {
                width: 18px;
                height: 18px;
            }
            .global-top-bar .wallet-btn {
                font-size: 10px;
                padding: 3px 8px 3px 4px;
                min-height: 28px;
                gap: 4px;
            }
            .global-top-bar .wallet-btn .wallet-icon-wrap {
                width: 18px;
                height: 18px;
            }
            .global-top-bar .wallet-btn .wallet-status-text {
                font-size: 10px;
                max-width: 70px;
            }
            .wallet-btn .wallet-icon-wrap .dot-red {
                width: 12px;
                height: 12px;
            }
            #app {
                padding: 16px 12px 20px;
                margin-top: 20px;
            }
            .token-icon-wrapper {
                width: 36px;
                height: 36px;
            }
            .token-icon-wrapper .chain-badge {
                width: 16px;
                height: 16px;
                font-size: 8px;
                bottom: -3px;
                right: -3px;
            }
            .token-name {
                font-size: 15px;
            }
            .amount-input,
            .amount-input-readonly {
                font-size: 18px;
            }
            .card-light {
                padding: 6px 10px;
            }
            .chain-selector .chain-icon {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            .chain-selector .chain-name {
                white-space: normal;
                overflow: visible;
                font-size: 11px;
                line-height: 1.2;
                flex: 1 1 auto;
                min-width: 0;
                word-break: break-word;
            }
            .chain-selector {
                padding: 4px 6px 4px 4px;
                gap: 4px;
            }
            .chain-selector .chain-label {
                font-size: 10px;
            }
            .chain-selector .chain-dropdown-arrow {
                font-size: 9px;
            }
            .swap-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
                margin: -8px auto;
            }
            .btn-primary {
                font-size: 15px;
                padding: 14px 16px;
            }
            .global-footer {
                padding: 16px 16px 24px 16px;
                font-size: 12px;
                gap: 6px;
            }
            .global-footer img {
                height: 16px;
            }
            .toast {
                font-size: 13px;
                padding: 12px 16px;
                bottom: 20px;
            }
        }
        @media (max-width: 380px) {
            .global-top-bar .brand {
                font-size: 12px;
            }
            .global-top-bar .brand .logo-icon {
                width: 32px;
                height: 32px;
            }
            .theme-toggle-btn {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            .theme-toggle-btn svg {
                width: 16px;
                height: 16px;
            }
            .global-top-bar .wallet-btn {
                font-size: 9px;
                padding: 2px 6px 2px 3px;
            }
            .global-top-bar .wallet-btn .wallet-status-text {
                max-width: 55px;
                font-size: 9px;
            }
            .global-top-bar .wallet-btn .wallet-icon-wrap {
                width: 16px;
                height: 16px;
            }
            .wallet-btn .wallet-icon-wrap .dot-red {
                width: 10px;
                height: 10px;
            }
            .chain-selector .chain-name {
                font-size: 10px;
            }
            .amount-input,
            .amount-input-readonly {
                font-size: 16px;
            }
            .token-name {
                font-size: 13px;
            }
            #app {
                margin-top: 16px;
            }
            .global-footer {
                padding: 12px 12px 20px 12px;
                font-size: 11px;
            }
            .global-footer img {
                height: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 顶部栏 ===== -->
    <div class="global-top-bar" id="topBar">
        <div class="brand">
            <div class="logo-icon" id="logoIcon">
                <img id="logoImg" src="https://i.hd-r.cn/090e8189-22b2-42cf-850d-9c8726ed7639.png" alt="DOGZ" />
            </div>
            <span>DOGZ BRIDGE</span>
        </div>
        <div class="actions">
            <!-- 主题切换按钮 -->
            <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="切换主题">

            function formatAddress(addr) {

            function formatBalance(bn, decimals = 18) {
                if (!bn) return '0.00';
                try {
                    const val = ethers.formatUnits(bn, decimals);
                    const num = parseFloat(val);
                    if (isNaN(num)) return '0.00';
                    if (num < 0.0001 && num > 0) return '<0.0001';
                    return num.toFixed(4);
                } catch { return '0.00'; }
            }

            function toWei(amount, decimals = 18) {
                try { return ethers.parseUnits(amount.toString(), decimals); } catch { return ethers.parseUnits('0',

            function getEffectiveMode() {
                if (state.theme === 'auto') {
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                return state.theme;
            }

            function setTheme(mode) {
                state.theme = mode;
                localStorage.setItem('bridge-theme', mode);

                if (state._systemThemeListener) {
                    try {
                        window.matchMedia('(prefers-color-scheme: dark)').removeEventListener('change', state
                            ._systemThemeListener);
                    } catch (e) {}
                    state._systemThemeListener = null;
                }

                if (mode === 'auto') {
                    const listener = (e) => {
                        const effective = e.matches ? 'dark' : 'light';
                        applyTheme(effective);
                        updateThemeUI();
                    };
                    state._systemThemeListener = listener;
                    try {
                        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', listener);
                    } catch (e) {
                        window.matchMedia('(prefers-color-scheme: dark)').addListener(listener);
                    }
                    const effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    applyTheme(effective);
                } else {
                    applyTheme(mode);
                }
                updateThemeUI();
            }

                dom.app.classList.remove('light', 'dark');
