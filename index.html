            // ======================= Tron 账户变化监听 =======================
            function handleTronAccountsChanged(address) {
                console.log('[Tron] 账户变化事件触发，原始参数:', address);
                let newAddr = null;
                if (typeof address === 'string') {
                    newAddr = address;
                } else if (address && typeof address === 'object') {
                    if (address.base58) newAddr = address.base58;
                    else if (address[0] && address[0].base58) newAddr = address[0].base58;
                    else if (Array.isArray(address) && address.length > 0 && typeof address[0] === 'string') newAddr = address[
                    0];
                }
                if (!newAddr || typeof newAddr !== 'string' || newAddr.length < 34) {
                    console.warn('[Tron] 无法解析地址，忽略');
                    return;
                }
                if (state.walletAddress !== newAddr) {
                    console.log('[Tron] 账户已切换:', newAddr);
                    state.walletAddress = newAddr;
                    state.tronAddress = newAddr;
                    updateWalletUI();
                    loadBalances().then(() => {
                        estimateReceive();
                    });
                    showToast('波场账户已切换', 'info');
                }
            }

            let tronPollingInterval = null;

            function startTronPolling() {
                if (tronPollingInterval) clearInterval(tronPollingInterval);
                tronPollingInterval = setInterval(async () => {
                    if (state.walletType !== 'tron' || !state.isConnected) return;
                    try {
                        const tronWeb = state.tronWeb || window.tronWeb || (window.tronLink && window.tronLink.tronWeb);
                        if (!tronWeb) return;
                        const addr = await tronWeb.defaultAddress.base58;
                        if (addr && addr !== state.walletAddress) {
                            console.log('[Tron] 轮询检测到账户变化:', addr);
                            state.walletAddress = addr;
                            state.tronAddress = addr;
                            updateWalletUI();
                            loadBalances().then(() => estimateReceive());
                            showToast('波场账户已切换', 'info');
                        }
                    } catch (e) { /* ignore */ }
                }, 3000);
            }

            // ======================= 钱包连接 =======================
            async function connectWallet(silent = false, force = false) {
                if (state.isConnected && !force) return;

                let targetWalletType = state.walletType;
                if (!state.isConnected) {
                    targetWalletType = isTronChain(state.sourceEid) ? 'tron' : 'evm';
                }

                // ---------- EVM ----------
                if (targetWalletType === 'evm' || (!state.isConnected && !isTronChain(state.sourceEid))) {
                    if (typeof window.ethereum === 'undefined') {
                        if (!silent) showToast('请安装 MetaMask', 'error');
                        return;
                    }
                    if (window.location.protocol === 'file:') {
                        if (!silent) showToast('请使用 http:// 协议打开', 'error');
                        return;
                    }
                    try {
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        if (!accounts || accounts.length === 0) {
                            if (!silent) showToast('未授权', 'error');
                            return;
                        }
                        const provider = new ethers.BrowserProvider(window.ethereum);
                        const signer = await provider.getSigner();
                        const address = await signer.getAddress();
                        const network = await provider.getNetwork();
                        const chainId = Number(network.chainId);

                        state.provider = provider;
                        state.signer = signer;
                        state.walletAddress = address;
                        state.isConnected = true;
                        state.walletType = 'evm';
                        state.currentChainId = chainId;

                        const eid = findEidByChainId(chainId);
                        state.currentChainSupported = !!eid;
                        if (!state.currentChainSupported) {
                            if (!silent) showToast('不支持当前链，请切换到支持的测试网', 'error');
                        } else {
                            state.sourceEid = eid;
                            if (state.targetEid === eid) {
                                const other = CHAIN_LIST.find(c => c.eid !== eid);
                                if (other) state.targetEid = other.eid;
                            }
                            updateChainUI();
                            updateTokenDisplay();
                            updateAddressSectionVisibility();
                            updateBridgeButtonState();
                        }

                        if (window._chainChangedHandler) {
                            window.ethereum.removeListener('chainChanged', window._chainChangedHandler);
                        }
                        if (window._accountsChangedHandler) {
                            window.ethereum.removeListener('accountsChanged', window._accountsChangedHandler);
                        }
                        window._chainChangedHandler = handleChainChanged;
                        window._accountsChangedHandler = handleAccountsChanged;
                        window.ethereum.on('chainChanged', window._chainChangedHandler);
                        window.ethereum.on('accountsChanged', window._accountsChangedHandler);

                        updateWalletUI();
                        await loadBalances();
                        if (!silent) showToast('钱包已连接', 'success');
                    } catch (error) {
                        console.error('连接失败:', error);
                        if (!silent) showToast('连接失败: ' + error.message, 'error');
                    }
                    return;
                }

                // ---------- Tron ----------
                if (targetWalletType === 'tron' || (!state.isConnected && isTronChain(state.sourceEid))) {
                    if (typeof window.tronWeb === 'undefined' && typeof window.tronLink === 'undefined') {
                        if (!silent) showToast('请安装 TronLink 钱包', 'error');
                        return;
                    }
                    try {
                        if (window.tronLink && typeof window.tronLink.request === 'function') {
                            if (force || !state.isConnected) {
                                await window.tronLink.request({ method: 'tron_requestAccounts' });
                            }
                        }
                        let tronWeb = state.tronWeb || window.tronWeb || (window.tronLink && window.tronLink.tronWeb);
                        if (!tronWeb) {
                            if (window.tronLink) {
                                tronWeb = window.tronLink.tronWeb;
                            }
                            if (!tronWeb) throw new Error('TronWeb 未初始化');
                        }
                        const address = tronWeb.defaultAddress.base58;
                        if (!address) throw new Error('未能获取 Tron 地址');

                        state.tronWeb = tronWeb;
                        state.tronAddress = address;
                        state.walletAddress = address;
                        state.isConnected = true;
                        state.walletType = 'tron';
                        state.currentChainSupported = true;
                        state.currentChainId = 2494104990;
                        if (!isTronChain(state.sourceEid)) {
                            state.sourceEid = '40420';
                        }
                        if (state.targetEid === state.sourceEid) {
                            const other = CHAIN_LIST.find(c => c.eid !== state.sourceEid);
                            if (other) state.targetEid = other.eid;
                        }

                        if (window.tronLink && typeof window.tronLink.on === 'function') {
                            if (state._tronAccountsHandler) {
                                try { window.tronLink.off('accountsChanged', state._tronAccountsHandler); } catch (e) {}
                            }
                            state._tronAccountsHandler = handleTronAccountsChanged;
                            window.tronLink.on('accountsChanged', state._tronAccountsHandler);
                        }
                        if (tronWeb && typeof tronWeb.on === 'function') {
                            if (state._tronAccountsHandler) {
                                try { tronWeb.off('accountChanged', state._tronAccountsHandler); } catch (e) {}
                            }
                            state._tronAccountsHandler = handleTronAccountsChanged;
                            tronWeb.on('accountChanged', state._tronAccountsHandler);
                        }
                        startTronPolling();

                        updateChainUI();
                        updateTokenDisplay();
                        updateAddressSectionVisibility();
                        updateBridgeButtonState();
                        updateWalletUI();
                        if (!silent) showToast('TronLink 已连接', 'success');
                        await loadBalances();
                    } catch (error) {
                        console.error('连接 TronLink 失败:', error);
                        if (!silent) showToast('连接 TronLink 失败: ' + error.message, 'error');
                    }
                    return;
                }

                if (!silent) showToast('无法识别钱包类型', 'error');
            }

            function disconnectWallet() {
                if (state._tronAccountsHandler) {
                    try {
                        if (window.tronLink && typeof window.tronLink.off === 'function') {
                            window.tronLink.off('accountsChanged', state._tronAccountsHandler);
                        } else if (state.tronWeb && typeof state.tronWeb.off === 'function') {
                            state.tronWeb.off('accountChanged', state._tronAccountsHandler);
                        }
                    } catch (e) {}
                    state._tronAccountsHandler = null;
                }
                if (tronPollingInterval) {
                    clearInterval(tronPollingInterval);
                    tronPollingInterval = null;
                }

                if (window.ethereum && window._chainChangedHandler) {
                    try {
                        window.ethereum.removeListener('chainChanged', window._chainChangedHandler);
                        window.ethereum.removeListener('accountsChanged', window._accountsChangedHandler);
                    } catch (e) {}
                }
                window._chainChangedHandler = null;
                window._accountsChangedHandler = null;

                state.isConnected = false;
                state.walletAddress = null;
                state.provider = null;
                state.signer = null;
                state.tronWeb = null;
                state.tronAddress = null;
                state.walletType = 'evm';
                state.currentChainId = null;
                state.sourceBalance = '0';
                state.targetEstimate = null;
                state.currentChainSupported = true;
                state.sourceEid = DEFAULT_SOURCE_EID;
                state.targetEid = DEFAULT_TARGET_EID;
                updateChainUI();
                updateTokenDisplay();
                updateAddressSectionVisibility();
                updateBridgeButtonState();
                updateWalletUI();
                dom.sourceBalance.textContent = '0.00';
                dom.targetEstimateInput.value = '—';
                showToast('已断开', 'info');
            }

            // ===== 事件处理 =====
            function handleAccountsChanged(accounts) {
                if (state.walletType !== 'evm') return;
                if (!accounts || accounts.length === 0) {
                    disconnectWallet();
                } else {
                    state.walletAddress = accounts[0];
                    if (window.ethereum) {
                        try {
                            const provider = new ethers.BrowserProvider(window.ethereum);
                            state.provider = provider;
                            provider.getSigner().then(signer => {
                                state.signer = signer;
                                updateWalletUI();
                                loadBalances();
                            }).catch(err => {
                                console.warn('获取 signer 失败:', err);
                                updateWalletUI();
                            });
                        } catch (err) {
                            console.warn('重新创建 provider 失败:', err);
                            updateWalletUI();
                        }
                    } else {
                        updateWalletUI();
                    }
                }
            }

            async function handleChainChanged(chainId) {
                if (state.walletType !== 'evm') {
                    console.log('[handleChainChanged] 忽略链切换事件，当前钱包类型为:', state.walletType);
                    return;
                }

                chainId = parseInt(chainId);
                state.currentChainId = chainId;
                if (typeof window.ethereum !== 'undefined') {
                    try {
                        const provider = new ethers.BrowserProvider(window.ethereum);
                        state.provider = provider;
                        state.signer = await provider.getSigner();
                    } catch (e) {
                        console.warn('更新 provider 失败:', e);
                    }
                }

                const eid = findEidByChainId(chainId);
                state.currentChainSupported = !!eid;
                if (!state.currentChainSupported) {
                    showToast('不支持当前链，请切换到支持的测试网', 'error');
                    dom.bridgeBtn.disabled = true;
                    dom.bridgeBtn.style.opacity = '0.5';
                    dom.bridgeBtn.style.cursor = 'not-allowed';
                } else {
                    dom.bridgeBtn.disabled = false;
                    dom.bridgeBtn.style.opacity = '1';
                    dom.bridgeBtn.style.cursor = 'pointer';
                    if (state.sourceEid !== eid) {
                        state.sourceEid = eid;
                        if (state.targetEid === eid) {
                            const other = CHAIN_LIST.find(c => c.eid !== eid);
                            if (other) state.targetEid = other.eid;
                        }
                        updateChainUI();
                        updateTokenDisplay();
                        updateAddressSectionVisibility();
                        updateBridgeButtonState();
                    }
                    await loadBalances();
                }
                updateWalletUI();
            }

            // ======================= 更新顶部钱包按钮 =======================
            function updateWalletUI() {
                const btn = dom.walletBtn;
                const wrap = dom.walletIconWrap;
                const statusText = dom.walletStatus;

                if (state.isConnected && state.walletAddress) {
                    let chain;
                    if (state.walletType === 'tron') {
                        chain = getChain('40420');
                    } else {
                        chain = getChain(state.sourceEid);
                    }
                    let iconHtml = '';
                    if (chain) {
                        if (chain.iconUrl) {
                            iconHtml =
                                `<img src="${chain.iconUrl}" alt="${chain.shortName}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;" />`;
                        } else {
                            iconHtml =
                                `<span style="font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${chain.icon || '⟠'}</span>`;
                        }
                    } else {
                        iconHtml =
                            `<span style="font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">⟠</span>`;
                    }
                    wrap.innerHTML = iconHtml;
                    statusText.textContent = formatAddress(state.walletAddress);
                    btn.classList.add('connected');
                } else {
                    wrap.innerHTML = `<span class="dot-red"></span>`;
                    statusText.textContent = '连接钱包';
                    btn.classList.remove('connected');
                }
            }

            // ======================= 链下拉菜单 =======================
            function buildDropdown(eid, container, isSource) {
                const currentEid = isSource ? state.sourceEid : state.targetEid;
                let html = '';
                for (const chain of CHAIN_LIST) {
                    const isSelected = chain.eid === currentEid;
                    const iconHtml = chain.iconUrl ?
                        `<img src="${chain.iconUrl}" alt="${chain.name}" />` :
                        `<span style="font-size:16px;">${chain.icon || '⛓️'}</span>`;
                    html += `
                        <div class="dropdown-item" data-eid="${chain.eid}" data-is-source="${isSource}">
                            <div class="item-icon" style="background:${chain.color}22;border-color:${chain.color};">
                                ${iconHtml}
                            </div>
                            <span class="item-name">${chain.name}</span>
                            <span class="item-sub">${chain.shortName}</span>
                            ${isSelected ? '<span class="item-check"><i class="fas fa-check"></i></span>' : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;
                container.querySelectorAll('.dropdown-item').forEach(el => {
                    el.addEventListener('click', async function(e) {
                        const eid = this.dataset.eid;
                        const isSource = this.dataset.isSource === 'true';
                        if (isSource) {
                            if (eid === state.targetEid) { showToast('源链和目标链不能相同', 'error'); return; }
                            await setSourceChain(eid);
                        } else {
                            if (eid === state.sourceEid) { showToast('源链和目标链不能相同', 'error'); return; }
                            setTargetChain(eid);
                        }
                        closeAllDropdowns();
                    });
                });
            }

            function closeAllDropdowns() {
                dom.sourceDropdown.classList.remove('open');
                dom.targetDropdown.classList.remove('open');
            }

            function toggleDropdown(container, isSource) {
                const isOpen = container.classList.contains('open');
                closeAllDropdowns();
                if (!isOpen) { container.classList.add('open');
                    buildDropdown(null, container, isSource); }
            }

            // ======================= 链切换 =======================
            async function setSourceChain(eid) {
                const oldEid = state.sourceEid;
                const targetIsTron = isTronChain(eid);
                const currentIsTron = state.walletType === 'tron';

                if (state.isConnected && targetIsTron !== currentIsTron) {
                    disconnectWallet();
                    state.sourceEid = eid;
                    await connectWallet(false, true);
                    if (!state.isConnected) {
                        state.sourceEid = oldEid;
                        updateChainUI();
                        updateTokenDisplay();
                        updateBridgeButtonState();
                        return;
                    }
                    updateChainUI();
                    updateTokenDisplay();
                    updateAddressSectionVisibility();
                    updateBridgeButtonState();
                    await loadBalances();
                    closeAllDropdowns();
                    return;
                }

                if (!targetIsTron && state.isConnected && state.walletType === 'evm') {
                    const chain = getChain(eid);
                    if (chain && chain.chainId !== state.currentChainId) {
                        try {
                            await window.ethereum.request({
                                method: 'wallet_switchEthereumChain',
                                params: [{ chainId: '0x' + chain.chainId.toString(16) }],
                            });
                            state.sourceEid = eid;
                            if (state.targetEid === eid) {
                                const other = CHAIN_LIST.find(c => c.eid !== eid);
                                if (other) state.targetEid = other.eid;
                            }
                            updateChainUI();
                            updateTokenDisplay();
                            updateAddressSectionVisibility();
                            updateBridgeButtonState();
                            await loadBalances();
                            closeAllDropdowns();
                            return;
                        } catch (error) {
                            state.sourceEid = oldEid;
                            if (error.code === 4001) {
                                showToast('用户拒绝切换网络', 'warning');
                            } else {
                                showToast('切换网络失败: ' + (error.message || '未知错误'), 'error');
                            }
                            updateChainUI();
                            updateTokenDisplay();
                            updateBridgeButtonState();
                            closeAllDropdowns();
                            return;
                        }
                    }
                }

                state.sourceEid = eid;
                if (state.targetEid === eid) {
                    const other = CHAIN_LIST.find(c => c.eid !== eid);
                    if (other) state.targetEid = other.eid;
                }
                updateChainUI();
                updateTokenDisplay();
                updateAddressSectionVisibility();
                updateBridgeButtonState();
                await loadBalances();
                closeAllDropdowns();
            }

            function setTargetChain(eid) {
                state.targetEid = eid;
                clearAddressInput();
                updateAddressSectionVisibility();
                updateChainUI();
                estimateReceive();
                closeAllDropdowns();
                updateTokenDisplay();
                updateBridgeButtonState();
            }

            function updateAddressSectionVisibility() {
                const isTron = isTronChain(state.sourceEid) || isTronChain(state.targetEid);
                if (isTron) {
                    state.showAddressInput = true;
                    dom.addressSection.classList.remove('hidden');
                } else {
                    if (!state.showAddressInput) {
                        dom.addressSection.classList.add('hidden');
                    }
                }
            }

            function clearAddressInput() {
                dom.targetAddressInput.value = '';
                state.customTargetAddress = '';
                const isTron = isTronChain(state.sourceEid) || isTronChain(state.targetEid);
                if (!isTron) {
                    dom.addressSection.classList.add('hidden');
                    state.showAddressInput = false;
                }
                updateBridgeButtonState();
            }

            function updateBridgeButtonState() {
                const isTron = isTronChain(state.sourceEid) || isTronChain(state.targetEid);
                const bridgeBtn = dom.bridgeBtn;
                if (!state.currentChainSupported && state.isConnected) {
                    bridgeBtn.disabled = true;
                    bridgeBtn.style.opacity = '0.5';
                    bridgeBtn.style.cursor = 'not-allowed';
                    return;
                }
                if (isTron) {
                    const addr = dom.targetAddressInput.value.trim();
                    if (!addr) {
                        bridgeBtn.disabled = true;
                        bridgeBtn.style.opacity = '0.5';
                        bridgeBtn.style.cursor = 'not-allowed';
                    } else {
                        bridgeBtn.disabled = false;
                        bridgeBtn.style.opacity = '1';
                        bridgeBtn.style.cursor = 'pointer';
                    }
                } else {
                    bridgeBtn.disabled = false;
                    bridgeBtn.style.opacity = '1';
                    bridgeBtn.style.cursor = 'pointer';
                }
            }

            // ===== 外部链名称显示 =====
            function updateChainUI() {
                const src = getChain(state.sourceEid);
                const dst = getChain(state.targetEid);
                if (src) {
                    dom.sourceChainName.textContent = (state.sourceEid === '40102') ? src.name : src.shortName;
                    if (src.iconUrl) {
                        dom.sourceChainIcon.innerHTML = `<img src="${src.iconUrl}" alt="${src.name}" />`;
                    } else {
                        dom.sourceChainIcon.innerHTML = `<span>${src.icon || '⟠'}</span>`;
                    }
                    dom.sourceChainLabel.textContent = src.nativeSymbol;
                }
                if (dst) {
                    dom.targetChainName.textContent = (state.targetEid === '40102') ? dst.name : dst.shortName;
                    if (dst.iconUrl) {
                        dom.targetChainIcon.innerHTML = `<img src="${dst.iconUrl}" alt="${dst.name}" />`;
                    } else {
                        dom.targetChainIcon.innerHTML = `<span>${dst.icon || '▲'}</span>`;
                    }
                    dom.targetChainLabel.textContent = dst.nativeSymbol;
                }
                updateWalletUI();
                updateTokenDisplay();
            }

            function updateTokenDisplay() {
                const mainIconHtml =
                    `<img src="${TOKEN_ICON_URL}" alt="${TOKEN_INFO.name}" onerror="this.style.display='none';this.parentElement.textContent='🐕';" />`;
                dom.sourceTokenIcon.innerHTML = mainIconHtml;
                dom.targetTokenIcon.innerHTML = mainIconHtml;
                dom.sourceTokenName.textContent = TOKEN_INFO.name;
                dom.targetTokenName.textContent = TOKEN_INFO.name;
                const srcChain = getChain(state.sourceEid);
                const dstChain = getChain(state.targetEid);
                dom.sourceTokenSymbol.textContent = srcChain ? srcChain.shortName : 'DOGZ';
                dom.targetTokenSymbol.textContent = dstChain ? dstChain.shortName : 'DOGZ';

                if (srcChain) {
                    const badgeHtml = srcChain.iconUrl ?
                        `<img src="${srcChain.iconUrl}" alt="${srcChain.shortName}" />` :
                        `<span>${srcChain.icon || '⟠'}</span>`;
                    dom.sourceTokenBadge.innerHTML = badgeHtml;
                }
                if (dstChain) {
                    const badgeHtml = dstChain.iconUrl ?
                        `<img src="${dstChain.iconUrl}" alt="${dstChain.shortName}" />` :
                        `<span>${dstChain.icon || '▲'}</span>`;
                    dom.targetTokenBadge.innerHTML = badgeHtml;
                }
            }

            // ======================= 余额 & 预估 =======================
            async function loadBalances() {
                if (!state.isConnected) {
                    dom.sourceBalance.textContent = '0.00';
                    return;
                }
                if (!state.currentChainSupported) {
                    dom.sourceBalance.textContent = '⚠️ 不支持链';
                    return;
                }
                try {
                    if (isTronChain(state.sourceEid)) {
                        if (!state.tronWeb) {
                            dom.sourceBalance.textContent = '?';
                            return;
                        }
                        const tokenAddr = getSourceTokenAddress(state.sourceEid);
                        if (!tokenAddr) { dom.sourceBalance.textContent = '?'; return; }
                        const contract = state.tronWeb.contract(TRC20_ABI, tokenAddr);
                        const balance = await contract.balanceOf(state.walletAddress).call();
                        const decimals = 18;
                        const formatted = formatBalance(balance, decimals);
                        state.sourceBalance = formatted;
                        dom.sourceBalance.textContent = formatted;
                        await estimateReceive();
                    } else {
                        if (!state.provider) {
                            dom.sourceBalance.textContent = '0.00';
                            return;
                        }
                        const tokenAddr = getSourceTokenAddress(state.sourceEid);
                        if (!tokenAddr) { dom.sourceBalance.textContent = '?'; return; }
                        const network = await state.provider.getNetwork();
                        const chainId = Number(network.chainId);
                        const expected = getChainId(state.sourceEid);
                        if (chainId !== expected) { dom.sourceBalance.textContent = '⚠️ 切换网络'; return; }
                        const contract = new ethers.Contract(tokenAddr, ERC20_ABI, state.provider);
                        let decimals = 18;
                        try {
                            decimals = await contract.decimals();
                        } catch (e) {
                            console.warn('[loadBalances] 获取 decimals 失败，使用默认值 18:', e);
                        }
                        const balance = await contract.balanceOf(state.walletAddress);
                        const formatted = formatBalance(balance, decimals);
                        state.sourceBalance = formatted;
                        dom.sourceBalance.textContent = formatted;
                        await estimateReceive();
                    }
                } catch (error) {
                    console.error('加载余额失败:', error);
                    dom.sourceBalance.textContent = '0.00';
                }
            }

            async function estimateReceive() {
                const amount = dom.amountInput.value;
                if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0 || !state.isConnected || !state
                    .currentChainSupported) {
                    dom.targetEstimateInput.value = '—';
                    state.targetEstimate = null;
                    return;
                }
                dom.targetEstimateInput.value = amount;
                state.targetEstimate = parseFloat(amount);
                if (isTronChain(state.sourceEid)) return;

                try {
                    const oAppAddr = getOAppAddress(state.sourceEid);
                    if (!oAppAddr) return;
                    const network = await state.provider.getNetwork();
                    if (Number(network.chainId) !== getChainId(state.sourceEid)) {
                        dom.targetEstimateInput.value = '⚠️ 切换网络';
                        return;
                    }
                    const tokenAddr = getSourceTokenAddress(state.sourceEid);
                    const tokenContract = new ethers.Contract(tokenAddr, ERC20_ABI, state.provider);
                    let decimals = 18;
                    try {
                        decimals = await tokenContract.decimals();
                    } catch (e) {
                        console.warn('[estimateReceive] 获取 decimals 失败，使用默认值 18:', e);
                    }
                    const contract = new ethers.Contract(oAppAddr, OAPP_ABI, state.provider);
                    const toAddress = state.customTargetAddress && state.customTargetAddress.length > 0 ?
                        state.customTargetAddress :
                        state.walletAddress;
                    let normalizedTo = toAddress;
                    try {
                        normalizedTo = normalizeAddress(toAddress);
                    } catch (e) {
                        return;
                    }
                    if (!ethers.isAddress(normalizedTo)) return;
                    const toBytes32 = ethers.zeroPadValue(normalizedTo, 32);
                    const amountWei = toWei(amount, decimals);
                    const sendParam = {
                        dstEid: parseInt(state.targetEid),
                        to: toBytes32,
                        amountLD: amountWei,
                        minAmountLD: amountWei,
                        extraOptions: '0x',
                        composeMsg: '0x',
                        oftCmd: '0x',
                    };
                    const fee = await contract.quoteSend(sendParam, false);
                    state.estimatedFee = { nativeFee: fee.nativeFee, lzTokenFee: fee.lzTokenFee };
                } catch (error) {
                    console.error('预估费用失败:', error);
                }
            }

            // ======================= 手续费提取 =======================
            function extractFee(feeResult) {
                function extract(arr) {
                    if (Array.isArray(arr)) {
                        if (arr.length === 2 && !Array.isArray(arr[0]) && !Array.isArray(arr[1])) {
                            return { nativeFee: arr[0], lzTokenFee: arr[1] };
                        }
                        if (Array.isArray(arr[0])) {
                            return extract(arr[0]);
                        }
                    }
                    if (typeof feeResult === 'object' && feeResult !== null) {
                        if (feeResult.msgFee) return extract(feeResult.msgFee);
                        if (feeResult.nativeFee !== undefined) {
                            return { nativeFee: feeResult.nativeFee, lzTokenFee: feeResult.lzTokenFee };
                        }
                        if (feeResult[0] !== undefined && feeResult[1] !== undefined) {
                            return { nativeFee: feeResult[0], lzTokenFee: feeResult[1] };
                        }
                    }
                    return null;
                }
                const result = extract(feeResult);
                if (!result || result.nativeFee === undefined) {
                    throw new Error('无法解析手续费：' + JSON.stringify(feeResult));
                }
                return result;
            }

            // ======================= 跨链桥接（授权逻辑优化） =======================
            async function bridge() {
                if (state.isProcessing) return;
                const amount = dom.amountInput.value;
                if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
                    showToast('请输入有效数量', 'error');
                    return;
                }
                if (!state.isConnected) { showToast('请先连接钱包', 'error'); return; }
                if (!state.currentChainSupported) {
                    showToast('当前链不支持，请切换网络', 'error');
                    return;
                }

                const isTargetTron = isTronChain(state.targetEid);
                const addrRaw = dom.targetAddressInput.value.trim();
                if (addrRaw) {
                    if (isTargetTron) {
                        if (!addrRaw.startsWith('T') || addrRaw.length < 34) {
                            showToast('地址格式错误：波场地址应以 T 开头且长度至少为 34 位', 'error');
                            return;
                        }
                    } else {
                        if (!addrRaw.startsWith('0x') || !ethers.isAddress(addrRaw)) {
                            showToast('地址格式错误：EVM 地址应以 0x 开头且为有效地址', 'error');
                            return;
                        }
                    }
                }

                const isTron = isTronChain(state.sourceEid) || isTronChain(state.targetEid);
                if (isTron) {
                    const addr = dom.targetAddressInput.value.trim();
                    if (!addr) {
                        showToast('请填写接收地址', 'error');
                        return;
                    }
                }

                // ---------- 波场源链 ----------
                if (isTronChain(state.sourceEid)) {
                    let tronWeb = state.tronWeb || window.tronWeb || (window.tronLink && window.tronLink.tronWeb);
                    let needLogin = false;
                    if (!tronWeb || !state.walletAddress || state.walletAddress.length < 34) {
                        needLogin = true;
                    }

                    if (needLogin) {
                        if (window.tronLink && typeof window.tronLink.request === 'function') {
                            try {
                                showToast('请解锁 TronLink 钱包', 'info');
                                let accounts = null;
                                if (typeof window.tronLink.requestAccounts === 'function') {
                                    accounts = await window.tronLink.requestAccounts();
                                } else {
                                    const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
                                    accounts = res;
                                }
                                if (accounts && accounts.length > 0) {
                                    const addr = accounts[0];
                                    tronWeb = window.tronLink.tronWeb || window.tronWeb;
                                    if (tronWeb) {
                                        state.tronWeb = tronWeb;
                                        state.walletAddress = addr;
                                        state.tronAddress = addr;
                                        state.isConnected = true;
                                        state.walletType = 'tron';
                                        state.currentChainSupported = true;
                                        state.currentChainId = 2494104990;
                                        updateChainUI();
                                        updateTokenDisplay();
                                        updateAddressSectionVisibility();
                                        updateBridgeButtonState();
                                        updateWalletUI();
                                        showToast('TronLink 已连接', 'success');
                                        await loadBalances();
                                    } else {
                                        throw new Error('TronWeb 未初始化');
                                    }
                                } else {
                                    throw new Error('用户未授权');
                                }
                            } catch (e) {
                                console.warn('唤醒失败:', e);
                                if (e.message && (e.message.includes('User denied') || e.message.includes('取消'))) {
                                    showToast('用户取消登录', 'warning');
                                } else {
                                    showToast('无法自动唤醒 TronLink，请手动点击 TronLink 图标解锁并连接', 'error');
                                }
                                return;
                            }
                        } else {
                            showToast('请安装并解锁 TronLink 钱包，然后点击连接', 'error');
                            return;
                        }
                    }

                    if (!state.walletAddress || state.walletAddress.length < 34) {
                        showToast('请先连接 TronLink 钱包', 'error');
                        return;
                    }
                    if (state.walletType !== 'tron' || !state.tronWeb) {
                        showToast('请连接 TronLink 钱包', 'error');
                        return;
                    }

                    state.isProcessing = true;
                    dom.bridgeBtn.disabled = true;
                    dom.bridgeBtn.innerHTML = '<span class="spinner"></span> 处理中...';

                    try {
                        const tronWeb = state.tronWeb;
                        const srcChain = getChain(state.sourceEid);
                        const dstChain = getChain(state.targetEid);
                        if (!srcChain || !dstChain) { showToast('链配置错误', 'error'); return; }

                        const tokenAddr = getSourceTokenAddress(state.sourceEid);
                        const oAppAddr = getOAppAddress(state.sourceEid);
                        if (!tokenAddr || !oAppAddr) { showToast('合约地址未配置', 'error'); return; }

                        const tokenContract = tronWeb.contract(TRC20_ABI, tokenAddr);
                        const decimals = 18;
                        const amountWei = toWei(amount, decimals);

                        // 1. 检查余额
                        const balanceResult = await tokenContract.balanceOf(state.walletAddress).call();
                        const balanceBig = BigInt(balanceResult.toString());
                        const amountBig = BigInt(amountWei.toString());
                        if (balanceBig < amountBig) {
                            const balFormatted = formatBalance(balanceResult, decimals);
                            showToast(`余额不足，当前余额 ${balFormatted}，需要 ${amount}`, 'error');
                            dom.bridgeBtn.disabled = false;
                            dom.bridgeBtn.innerHTML = '<i class="fas fa-arrows-spin"></i> 跨链桥接';
                            state.isProcessing = false;
                            return;
                        }

                        // 2. 检查授权额度是否 >= 本次交易数量
                        const allowanceResult = await tokenContract.allowance(state.walletAddress, oAppAddr).call();
                        const allowanceBig = BigInt(allowanceResult.toString());
                        if (allowanceBig < amountBig) {
                            // 授权不足，授权无限量
                            showToast('正在授权代币...', 'info');
                            const maxUint256 = BigInt('0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff');
                            const approveTx = await tokenContract.approve(oAppAddr, maxUint256.toString()).send({
                                feeLimit: 100000000,
                                callValue: 0
                            });
                            await tronWeb.trx.getTransactionInfo(approveTx);
                            showToast('授权成功', 'success');
                        }

                        let toAddress = dom.targetAddressInput.value.trim();
                        let normalizedTo;
                        try {
                            normalizedTo = normalizeAddress(toAddress);
                        } catch (e) {
                            showToast('接收地址无效: ' + e.message, 'error');
                            return;
                        }
                        if (!ethers.isAddress(normalizedTo)) {
                            showToast('无效的接收地址', 'error');
                            return;
                        }
                        const toBytes32 = '0x' + normalizedTo.slice(2).padStart(64, '0');

                        const oAppContract = tronWeb.contract(FULL_OAPP_ABI, oAppAddr);
                        const sendParamArray = [
                            parseInt(state.targetEid),
                            toBytes32,
                            amountWei.toString(),
                            amountWei.toString(),
                            '0x',
                            '0x',
                            '0x'
                        ];

                        let feeResult;
                        try {
                            feeResult = await oAppContract.quoteSend(sendParamArray, false).call();
                        } catch (quoteError) {
                            console.error('quoteSend 详细错误:', quoteError);
                            throw new Error(`quoteSend 调用失败: ${quoteError.message || quoteError}`);
                        }

                        const { nativeFee, lzTokenFee } = extractFee(feeResult);

                        const accountInfo = await tronWeb.trx.getAccount(state.walletAddress);
                        const trxBalance = Number(accountInfo?.balance || 0);
                        const requiredTrx = Number(nativeFee) + 1000000;
                        if (trxBalance < requiredTrx) {
                            showToast(`手续费不足，当前 TRX 余额 ${(trxBalance / 1e6).toFixed(4)} TRX，需要 ${(requiredTrx / 1e6).toFixed(4)} TRX`, 'error');
                            return;
                        }

                        showToast('正在发送跨链交易...', 'info');
                        const tx = await oAppContract.send(
                            sendParamArray,
                            [nativeFee, lzTokenFee],
                            state.walletAddress
                        ).send({
                            feeLimit: 500000000,
                            callValue: nativeFee,
                            shouldPollResponse: false
                        });

                        const explorerUrl = state.explorerUrls[state.sourceEid] || '';
                        const txLink = explorerUrl ? `<a href="${explorerUrl}${tx}" target="_blank">${tx}</a>` : tx;
                        showToast(`🎉 跨链交易已提交！哈希: ${txLink}`, 'success');

                        dom.amountInput.value = '';
                        clearAddressInput();
                        await loadBalances();
                        dom.targetEstimateInput.value = '—';
                    } catch (error) {
                        console.error('交易失败:', error);
                        let errMsg = error.message || '';
                        if (errMsg.includes('User denied') || errMsg.includes('cancel') || errMsg.includes('Cancelled') ||
                            errMsg.includes('用户拒绝') || errMsg.includes('rejected') || errMsg.includes('denied') ||
                            error.code === 4001) {
                            showToast('交易失败：用户取消交易', 'warning');
                        } else {
                            showToast('交易失败: ' + errMsg, 'error');
                        }
                    } finally {
                        state.isProcessing = false;
                        dom.bridgeBtn.disabled = false;
                        dom.bridgeBtn.innerHTML = '<i class="fas fa-arrows-spin"></i> 跨链桥接';
                        updateBridgeButtonState();
                    }
                    return;
                }

                // ---------- EVM 源链 ----------
                if (state.walletType !== 'evm' || !state.signer) {
                    showToast('请连接 EVM 钱包', 'error');
                    return;
                }
                state.isProcessing = true;
                dom.bridgeBtn.disabled = true;
                dom.bridgeBtn.innerHTML = '<span class="spinner"></span> 处理中...';

                try {
                    const srcChain = getChain(state.sourceEid);
                    const dstChain = getChain(state.targetEid);
                    if (!srcChain || !dstChain) { showToast('链配置错误', 'error'); return; }

                    const network = await state.provider.getNetwork();
                    if (Number(network.chainId) !== getChainId(state.sourceEid)) {
                        showToast(`请切换到 ${srcChain.name}`, 'error');
                        return;
                    }

                    const oAppAddr = getOAppAddress(state.sourceEid);
                    if (!oAppAddr) { showToast('OApp 地址未配置', 'error'); return; }
                    const contract = new ethers.Contract(oAppAddr, OAPP_ABI, state.signer);

                    const tokenAddr = getSourceTokenAddress(state.sourceEid);
                    if (!tokenAddr) { showToast('代币地址未配置', 'error'); return; }
                    const tokenContract = new ethers.Contract(tokenAddr, ERC20_ABI, state.signer);
                    let decimals = 18;
                    try {
                        decimals = await tokenContract.decimals();
                    } catch (e) {
                        console.warn('[bridge] 获取 decimals 失败，使用默认值 18:', e);
                    }
                    const amountWei = toWei(amount, decimals);

                    // 1. 检查代币余额
                    const tokenBalance = await tokenContract.balanceOf(state.walletAddress);
                    if (tokenBalance < amountWei) {
                        const balFormatted = formatBalance(tokenBalance, decimals);
                        showToast(`代币余额不足，当前余额 ${balFormatted}，需要 ${amount}`, 'error');
                        dom.bridgeBtn.disabled = false;
                        dom.bridgeBtn.innerHTML = '<i class="fas fa-arrows-spin"></i> 跨链桥接';
                        state.isProcessing = false;
                        return;
                    }

                    // 2. 检查授权额度是否 >= 本次交易数量
                    let needApprove = false;
                    try {
                        const allowance = await tokenContract.allowance(state.walletAddress, oAppAddr);
                        if (allowance < amountWei) {
                            needApprove = true;
                        }
                    } catch (e) {
                        console.warn('[bridge] allowance 检查失败，将尝试直接授权:', e);
                        needApprove = true;
                    }
                    if (needApprove) {
                        showToast('授权代币...', 'info');
                        try {
                            const approveTx = await tokenContract.approve(oAppAddr, ethers.MaxUint256);
                            await approveTx.wait();
                            showToast('授权成功', 'success');
                        } catch (approveError) {
                            let errMsg = approveError.message || '';
                            if (approveError.code === 4001 || approveError.code === 'ACTION_REJECTED' ||
                                errMsg.includes('user rejected') || errMsg.includes('denied') ||
                                errMsg.includes('User denied')) {
                                showToast('用户取消授权', 'warning');
                                dom.bridgeBtn.disabled = false;
                                dom.bridgeBtn.innerHTML = '<i class="fas fa-arrows-spin"></i> 跨链桥接';
                                state.isProcessing = false;
                                return;
                            } else {
                                // 其他错误，尝试继续（可能不需要授权）
                                console.warn('授权失败，继续尝试交易:', approveError);
                            }
                        }
                    }

                    // 3. 估算费用并检查 Gas
                    let fee;
                    try {
                        fee = await contract.quoteSend({
                            dstEid: parseInt(state.targetEid),
                            to: ethers.zeroPadValue(normalizeAddress(state.customTargetAddress || state.walletAddress), 32),
                            amountLD: amountWei,
                            minAmountLD: amountWei,
                            extraOptions: '0x',
                            composeMsg: '0x',
                            oftCmd: '0x',
                        }, false);
                    } catch (e) {
                        showToast('预估费用失败: ' + e.message, 'error');
                        return;
                    }
                    const nativeFee = fee.nativeFee;
                    const nativeBalance = await state.provider.getBalance(state.walletAddress);
                    const needed = nativeFee + nativeFee / 100n;
                    if (nativeBalance < needed) {
                        const symbol = srcChain.nativeSymbol || 'ETH';
                        const balEth = ethers.formatUnits(nativeBalance, 18);
                        const needEth = ethers.formatUnits(needed, 18);
                        showToast(`手续费不足，当前 ${symbol} 余额 ${balEth}，需要 ${needEth} ${symbol}`, 'error');
                        return;
                    }

                    const sendParam = {
                        dstEid: parseInt(state.targetEid),
                        to: ethers.zeroPadValue(normalizeAddress(state.customTargetAddress || state.walletAddress), 32),
                        amountLD: amountWei,
                        minAmountLD: amountWei,
                        extraOptions: '0x',
                        composeMsg: '0x',
                        oftCmd: '0x',
                    };
                    const feeStruct = { nativeFee: nativeFee, lzTokenFee: 0n };

                    showToast('发送交易...', 'info');
                    const tx = await contract.send(sendParam, feeStruct, state.walletAddress, {
                        value: nativeFee,
                    });
                    const receipt = await tx.wait();
                    const txHash = receipt.hash;

                    const explorerUrl = state.explorerUrls[state.sourceEid] || '';
                    const txLink = explorerUrl ? `<a href="${explorerUrl}${txHash}" target="_blank">${txHash}</a>` : txHash;
                    showToast(`🎉 成功！哈希: ${txLink}`, 'success');

                    dom.amountInput.value = '';
                    clearAddressInput();
                    await loadBalances();
                    dom.targetEstimateInput.value = '—';
                } catch (error) {
                    console.error('跨链失败:', error);
                    let errMsg = error.message || '';
                    if (error.code === 'ACTION_REJECTED' || error.code === 4001 ||
                        errMsg.includes('user rejected') || errMsg.includes('denied')) {
                        showToast('交易失败：用户取消交易', 'warning');
                    } else {
                        showToast('跨链失败: ' + errMsg, 'error');
                    }
                } finally {
                    state.isProcessing = false;
                    dom.bridgeBtn.disabled = false;
                    dom.bridgeBtn.innerHTML = '<i class="fas fa-arrows-spin"></i> 跨链桥接';
                    updateBridgeButtonState();
                }
            }

            // ======================= 初始化 =======================
            function init() {
                initTheme();
                bindThemeEvents();

                dom.walletBtn.addEventListener('click', () => connectWallet(false, true));

                dom.maxBtn.addEventListener('click', () => {
                    if (!state.isConnected) { showToast('请先连接钱包', 'error'); return; }
                    if (!state.currentChainSupported) { showToast('当前链不支持', 'error'); return; }
                    const bal = parseFloat(state.sourceBalance);
                    if (isNaN(bal) || bal <= 0) { showToast('余额为0', 'warning'); return; }
                    const maxAmount = Math.max(0, bal - 0.001);
                    dom.amountInput.value = maxAmount.toFixed(6);
                    estimateReceive();
                });

                dom.swapBtn.addEventListener('click', async () => {
                    const src = state.sourceEid,
                        dst = state.targetEid;
                    if (src === dst) { showToast('无法切换相同的链', 'warning'); return; }
                    const oldHasTron = isTronChain(src) || isTronChain(dst);
                    await setSourceChain(dst);
                    state.targetEid = src;
                    const newSrc = state.sourceEid,
                        newDst = state.targetEid;
                    const newHasTron = isTronChain(newSrc) || isTronChain(newDst);
                    if (newHasTron) {
                        dom.targetAddressInput.value = '';
                        state.customTargetAddress = '';
                        dom.addressSection.classList.add('hidden');
                        state.showAddressInput = false;
                    }
                    updateAddressSectionVisibility();
                    updateChainUI();
                    loadBalances();
                    estimateReceive();
                    closeAllDropdowns();
                    updateBridgeButtonState();
                    showToast('已切换链', 'info');
                });

                dom.bridgeBtn.addEventListener('click', bridge);

                dom.sourceChainSelector.addEventListener('click', () => toggleDropdown(dom.sourceDropdown, true));
                dom.targetChainSelector.addEventListener('click', () => toggleDropdown(dom.targetDropdown, false));

                dom.toggleAddressBtn.addEventListener('click', () => {
                    state.showAddressInput = !state.showAddressInput;
                    dom.addressSection.classList.toggle('hidden', !state.showAddressInput);
                    if (!state.showAddressInput) { dom.targetAddressInput.value = '';
                        state.customTargetAddress = ''; }
                    updateBridgeButtonState();
                });
                dom.closeAddressBtn.addEventListener('click', () => {
                    state.showAddressInput = false;
                    dom.addressSection.classList.add('hidden');
                    dom.targetAddressInput.value = '';
                    state.customTargetAddress = '';
                    updateBridgeButtonState();
                });
                dom.targetAddressInput.addEventListener('input', (e) => {
                    state.customTargetAddress = e.target.value.trim();
                    estimateReceive();
                    updateBridgeButtonState();
                });
                dom.amountInput.addEventListener('input', estimateReceive);
                dom.amountInput.addEventListener('change', estimateReceive);

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.dropdown-menu') && !e.target.closest('.chain-selector')) {
                        closeAllDropdowns();
                    }
                });

                updateAddressSectionVisibility();
                updateChainUI();
                updateTokenDisplay();
                updateBridgeButtonState();

                if (window.location.protocol !== 'file:' && typeof window.ethereum !== 'undefined') {
                    connectWallet(true, false).then(() => {
                        updateChainUI();
                        updateTokenDisplay();
                        updateAddressSectionVisibility();
                        updateBridgeButtonState();
                        loadBalances();
                    }).catch(() => {});
                }

                console.log('🐕 Dogz Bridge 已启动（授权逻辑优化：检查授权额度是否充足）');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
